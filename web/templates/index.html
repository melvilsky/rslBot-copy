<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSL Bot — Control Panel</title>
<style>
:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c5ce7;
    --accent-hover: #7c6df7;
    --text: #e0e0e0;
    --text-muted: #8b8fa3;
    --success: #00b894;
    --danger: #ff6b6b;
    --warning: #ffc048;
    --log-bg: #12141c;
    --result-bg: #111420;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

.container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
}

header h1 {
    font-size: 1.4rem;
    font-weight: 600;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    background: var(--card);
    border: 1px solid var(--border);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
}

.status-dot.busy { background: var(--warning); animation: pulse 1.5s infinite; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.category {
    margin-bottom: 24px;
}

.category-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-left: 4px;
}

.commands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
}

.cmd-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-size: 0.9rem;
}

.cmd-btn:hover {
    border-color: var(--accent);
    background: #1e2130;
}

.cmd-btn:active {
    transform: scale(0.97);
}

.cmd-btn.running {
    border-color: var(--warning);
    background: rgba(255, 192, 72, 0.08);
}

.cmd-btn .cmd-name {
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
}

.cmd-btn .cmd-desc {
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 4px;
}

/* ── Results Panel ── */
.results-section {
    margin-top: 32px;
}

.results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.results-header h2 {
    font-size: 1rem;
    font-weight: 600;
}

.results-clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
}

.results-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

#results-output {
    background: var(--result-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    min-height: 60px;
    max-height: 600px;
    overflow-y: auto;
}

#results-output:empty::before {
    content: 'Результаты команд появятся здесь...';
    color: var(--text-muted);
    font-size: 0.8rem;
    font-style: italic;
}

.result-item {
    padding: 12px;
    margin-bottom: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

.result-item .result-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.result-item .result-cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
}

.result-item .result-time {
    font-size: 0.7rem;
    color: var(--text-muted);
}

.result-item .result-text {
    font-size: 0.85rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
}

.result-item img {
    max-width: 100%;
    border-radius: 6px;
    margin-top: 8px;
    cursor: pointer;
    transition: transform 0.2s;
}

.result-item img:hover {
    transform: scale(1.02);
}

/* ── Image Lightbox ── */
.lightbox-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
}

.lightbox-overlay.active {
    display: flex;
}

.lightbox-overlay img {
    max-width: 95vw;
    max-height: 95vh;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* ── Logs Panel ── */
.log-section {
    margin-top: 32px;
}

.log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.log-header h2 {
    font-size: 1rem;
    font-weight: 600;
}

.log-clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
}

.log-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

#log-output {
    background: var(--log-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    height: 250px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    font-size: 0.8rem;
    line-height: 1.6;
}

.log-line {
    padding: 1px 0;
    word-break: break-all;
}

.log-line .ts {
    color: var(--text-muted);
    margin-right: 8px;
}

.response-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 18px;
    max-width: 400px;
    font-size: 0.85rem;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 1000;
}

.response-toast.show {
    opacity: 1;
    transform: translateY(0);
}

.inline-keyboard {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.inline-keyboard-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.inline-btn {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
}

.inline-btn:hover {
    background: var(--accent);
    color: #fff;
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>RSL Bot</h1>
        <div class="status-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Idle</span>
        </div>
    </header>

    {% for cat_name, cmds in commands_grouped %}
    <div class="category">
        <div class="category-title">{{ cat_name }}</div>
        <div class="commands-grid">
            {% for cmd in cmds %}
            <button class="cmd-btn" data-cmd="{{ cmd.command }}" onclick="runCommand('{{ cmd.command }}')">
                <div class="cmd-name">/{{ cmd.command }}</div>
                <div class="cmd-desc">{{ cmd.description }}</div>
            </button>
            {% endfor %}
        </div>
    </div>
    {% endfor %}

    <!-- Results Panel -->
    <div class="results-section">
        <div class="results-header">
            <h2>Результаты</h2>
            <button class="results-clear-btn" onclick="clearResults()">Clear</button>
        </div>
        <div id="results-output"></div>
    </div>

    <!-- Logs Panel -->
    <div class="log-section">
        <div class="log-header">
            <h2>Logs</h2>
            <button class="log-clear-btn" onclick="clearLogs()">Clear</button>
        </div>
        <div id="log-output"></div>
    </div>
</div>

<div class="response-toast" id="toast"></div>

<!-- Lightbox for full-size images -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Screenshot">
</div>

<script>
var logOutput = document.getElementById('log-output');
var resultsOutput = document.getElementById('results-output');
var toast = document.getElementById('toast');
var statusDot = document.getElementById('status-dot');
var statusText = document.getElementById('status-text');
var lightbox = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');

var pendingCommandRequestId = null;
var pendingCommandTimer = null;
var lastCommandName = '';

function clearPendingCommand() {
    pendingCommandRequestId = null;
    if (pendingCommandTimer) {
        clearTimeout(pendingCommandTimer);
        pendingCommandTimer = null;
    }
}

function addLog(text) {
    var line = document.createElement('div');
    line.className = 'log-line';
    var now = new Date().toLocaleTimeString();
    line.innerHTML = '<span class="ts">' + now + '</span>' + parseBotHtml(text);
    logOutput.appendChild(line);
    logOutput.scrollTop = logOutput.scrollHeight;

    while (logOutput.children.length > 500) {
        logOutput.removeChild(logOutput.firstChild);
    }
}

function addResult(cmdName, payload) {
    var item = document.createElement('div');
    item.className = 'result-item';

    var now = new Date().toLocaleTimeString();
    var meta = '<div class="result-meta"><span class="result-cmd">/' + escapeHtml(cmdName) + '</span><span class="result-time">' + now + '</span></div>';
    var body = '';

    if (typeof payload === 'string') {
        body = '<div class="result-text">' + parseBotHtml(payload) + '</div>';
    } else if (payload && typeof payload === 'object') {
        if (payload.text) {
            body += '<div class="result-text">' + parseBotHtml(payload.text) + '</div>';
        }
        if (payload.image) {
            body += '<img src="' + payload.image + '" onclick="openLightbox(this.src)" alt="Screenshot">';
        }
        if (payload.buttons) {
            body += renderInlineButtonsHTML(payload.buttons);
        }
    }

    item.innerHTML = meta + body;
    resultsOutput.insertBefore(item, resultsOutput.firstChild);

    // Keep max 50 results
    while (resultsOutput.children.length > 50) {
        resultsOutput.removeChild(resultsOutput.lastChild);
    }
}

function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('active');
}

function closeLightbox() {
    lightbox.classList.remove('active');
}

// Close lightbox on ESC
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
});

function parseBotHtml(text) {
    if (!text) return '';
    // First, escape everything for safety
    var div = document.createElement('div');
    div.textContent = text;
    var escaped = div.innerHTML;

    // Then, unlock specific safe tags
    return escaped
        .replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<b>$1</b>')
        .replace(/&lt;i&gt;(.*?)&lt;\/i&gt;/gi, '<i>$1</i>')
        .replace(/&lt;u&gt;(.*?)&lt;\/u&gt;/gi, '<u>$1</u>')
        .replace(/&lt;s&gt;(.*?)&lt;\/s&gt;/gi, '<s>$1</s>')
        .replace(/&lt;code&gt;(.*?)&lt;\/code&gt;/gi, '<code>$1</code>')
        .replace(/&lt;pre&gt;(.*?)&lt;\/pre&gt;/gi, '<pre>$1</pre>');
}

function clearLogs() {
    logOutput.innerHTML = '';
}

function clearResults() {
    resultsOutput.innerHTML = '';
}

function renderInlineButtonsHTML(buttonsLayout) {
    var html = '<div class="inline-keyboard">';
    buttonsLayout.forEach(function(row) {
        html += '<div class="inline-keyboard-row">';
        row.forEach(function(btn) {
            html += '<button class="inline-btn" onclick="sendCallback(\'' + escapeHtml(btn.callback_data) + '\')">' + escapeHtml(btn.text) + '</button>';
        });
        html += '</div>';
    });
    html += '</div>';
    return html;
}

function renderInlineButtons(buttonsLayout) {
    var container = document.createElement('div');
    container.className = 'inline-keyboard';
    buttonsLayout.forEach(function(row) {
        var rowDiv = document.createElement('div');
        rowDiv.className = 'inline-keyboard-row';
        row.forEach(function(btn) {
            var button = document.createElement('button');
            button.className = 'inline-btn';
            button.textContent = btn.text;
            button.onclick = function() {
                sendCallback(btn.callback_data);
            };
            rowDiv.appendChild(button);
        });
        container.appendChild(rowDiv);
    });
    logOutput.appendChild(container);
    logOutput.scrollTop = logOutput.scrollHeight;
}

function processResponse(r, cmdName) {
    if (typeof r === 'object' && r !== null) {
        addResult(cmdName, r);
        if (r.text) addLog('[response] ' + r.text);
        if (r.image) addLog('[response] 📷 Screenshot received');
    } else {
        addResult(cmdName, r);
        addLog('[response] ' + r);
    }
}

function sendCallback(data) {
    addLog('>>> Callback: ' + data);
    fetch('/api/callback', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({data: data})
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
         if (res.responses && res.responses.length) {
            res.responses.forEach(function(r) {
                processResponse(r, 'callback');
            });
            var first = res.responses[0];
            showToast(typeof first === 'object' ? (first.text || 'OK') : first);
         }
    })
    .catch(function(err) {
        addLog('[error] ' + err);
        showToast('Error: ' + err, 5000);
    });
}

function showToast(text, duration) {
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, duration || 3000);
}

function runCommand(name) {
    clearPendingCommand();
    lastCommandName = name;
    var btn = document.querySelector('[data-cmd="' + name + '"]');
    if (btn) btn.classList.add('running');
    addLog('>>> Executing: /' + name);

    fetch('/api/command/' + name, {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (btn) btn.classList.remove('running');
            if (data.responses && data.responses.length) {
                data.responses.forEach(function(r) {
                    processResponse(r, name);
                });
                var first = data.responses[0];
                showToast(typeof first === 'object' ? (first.text || 'OK') : first);
                clearPendingCommand();
            } else {
                addLog('[response] Command accepted (async — completion via SSE)');
                showToast('Command /' + name + ' accepted');
                pendingCommandRequestId = data.request_id || null;
                if (pendingCommandRequestId) {
                    pendingCommandTimer = setTimeout(function() {
                        clearPendingCommand();
                    }, 300000);
                }
            }
        })
        .catch(function(err) {
            if (btn) btn.classList.remove('running');
            addLog('[error] ' + err);
            showToast('Error: ' + err, 5000);
            clearPendingCommand();
        });
}

// SSE for live logs
var evtSource;
function connectSSE() {
    evtSource = new EventSource('/api/logs');
    evtSource.onmessage = function(e) {
        try {
            var data = JSON.parse(e.data);
            if (typeof data === 'object' && data !== null && data.type === 'command_result') {
                var responsePayload = data.text;
                var cmdName = lastCommandName || 'async';

                if (pendingCommandRequestId && data.request_id === pendingCommandRequestId) {
                    clearPendingCommand();
                }

                processResponse(responsePayload, cmdName);
                var textMsg = typeof responsePayload === 'string' ? responsePayload : (responsePayload.text || 'OK');
                showToast(textMsg);
                return;
            }
            addLog(typeof data === 'string' ? data : (data.text != null ? data.text : JSON.stringify(data)));
        } catch (_) {
            addLog(e.data);
        }
    };
    evtSource.onerror = function() {
        evtSource.close();
        setTimeout(connectSSE, 3000);
    };
}
connectSSE();

// Poll status
function pollStatus() {
    fetch('/api/status')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.current_task) {
                statusDot.className = 'status-dot busy';
                statusText.textContent = 'Running: ' + data.current_task;
            } else {
                statusDot.className = 'status-dot';
                statusText.textContent = data.queue_size > 0
                    ? 'Queue: ' + data.queue_size
                    : 'Idle';
            }
        })
        .catch(function() {});
}
setInterval(pollStatus, 2000);
pollStatus();
</script>
</body>
</html>
